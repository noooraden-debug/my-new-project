<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حلويات نسرين | فخامة الصناعة المنزلية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Tajawal:wght@400;700&display=swap');
        
        body { 
            margin: 0; font-family: 'Tajawal', sans-serif;
            background: url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=1600') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; text-align: center; color: #fff;
        }
        .overlay { background: rgba(0,0,0,0.5); padding: 50px 20px; min-height: 100vh; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 30px; }
        
        .card { 
            background: rgba(255, 255, 255, 0.95); border: 2px solid #d4af37;
            border-radius: 30px 10px 30px 10px; width: 280px; padding: 20px;
            color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; border: 2px solid #d4af37; }
        
        .btn { display: block; padding: 12px; margin: 10px 0; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-img { background: #d4af37; color: white; }
    </style>
</head>
<body>
    <div class="overlay">
        <h1>حلويات نسرين 🌸</h1>
        <p>نصنع الفرح بأرقى النكهات المنزلية</p>
        <div class="container" id="products-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://nesreen-sweets-default-rtdb.firebaseio.com" }));

        // خريطة صور احترافية لكل صنف
        const images = {
            "معمول عجوة": "https://images.unsplash.com/photo-1621351187431-72901309f3ed?w=500",
            "معمول جوز": "https://images.unsplash.com/photo-1605335555728-6623193e157e?w=500",
            "معمول فستق": "https://images.unsplash.com/photo-1605335555728-6623193e157e?w=500",
            "بيتفور": "https://images.unsplash.com/photo-1599785209796-7860a3b23423?w=500",
            "برازق": "https://images.unsplash.com/photo-1601050690597-df0568f70950?w=500",
            "كوكيز بقطع الشوكولاتة": "https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=500"
        };

        onValue(ref(db, 'products'), (snapshot) => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const name = child.val();
                const imgUrl = images[name] || "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500";
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${imgUrl}" alt="${name}">
                    <h2>${name}</h2>
                    <a class="btn btn-wa" href="https://wa.me/963982344943?text=مرحباً، لقد شاهدت منصة حلويات نسرين ومعجب بالأصناف. أود طلب: ${name}. رابط المنصة: ${window.location.href}">اطلب ${name} الآن</a>
                    <a class="btn btn-img" href="${imgUrl}" target="_blank">عرض صورة المنتج</a>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
