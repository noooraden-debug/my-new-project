<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Amiri:ital@1&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            background: linear-gradient(45deg, #2c1e14, #5d3a29, #8b4513, #a0522d);
            background-size: 400% 400%; animation: kitchenMove 20s ease infinite;
            color: #fff; text-align: center;
        }
        @keyframes kitchenMove { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        header { padding: 60px 20px; text-shadow: 3px 3px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 3.5rem; color: #ffd700; margin-bottom: 10px; border-bottom: 2px solid #ffd700; display: inline-block; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 30px; }
        .card { 
            background: rgba(255, 255, 255, 0.98); border-radius: 40px 10px 40px 10px;
            width: 300px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 4px solid #ffd700; color: #333;
        }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 30px 5px 30px 5px; }
        
        .btn { display: block; padding: 15px; margin: 12px 0; border-radius: 50px; font-weight: 900; font-size: 1.1rem; cursor: pointer; border: none; }
        .btn-wa { background: #27ae60; color: #fff; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4); }
        .btn-img { background: #b8860b; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>🌸 حلويات نسرين 🌸</h1>
        <p style="font-size: 1.5rem; font-family: 'Amiri';">سحر الأصالة في كل لقمة.. من بيتنا إلى قلوبكم</p>
    </header>

    <div class="container" id="products-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://nesreen-sweets-default-rtdb.firebaseio.com" }));

        // تحسين الصور لتكون أكثر واقعية
        const images = {
            "برازق": "https://img.freepik.com/free-photo/arabic-cookies-pistachio_144627-14227.jpg",
            "بيتفور": "https://img.freepik.com/free-photo/delicious-petit-four-cookies_144627-26887.jpg",
            "معمول عجوة": "https://img.freepik.com/free-photo/maamoul-dates-cookies-traditional-arabic-dessert_144627-31993.jpg",
            "معمول فستق": "https://img.freepik.com/free-photo/maamoul-pistachio-traditional-arabic-cookies_144627-31994.jpg",
            "كوكيز بقطع الشوكولاتة": "https://img.freepik.com/free-photo/chocolate-chip-cookies_144627-26463.jpg"
        };

        onValue(ref(db, 'products'), (snapshot) => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const name = child.val();
                const img = images[name] || "https://img.freepik.com/free-photo/arabic-sweets-assortment_144627-26510.jpg";
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${img}" alt="${name}">
                    <h2 style="font-family: 'Cairo';">${name}</h2>
                    <a class="btn btn-wa" href="https://wa.me/963982344943?text=مرحباً، لقد شاهدت منصة حلويات نسرين ومعجب بالأصناف جداً. أود طلب: ${name}. رابط المنصة: ${window.location.href}">اطلب الآن عبر واتساب 💬</a>
                    <a class="btn btn-img" href="${img}" target="_blank">شاهد المنتج عن قرب ✨</a>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
