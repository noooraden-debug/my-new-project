<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Amiri', serif; color: white; text-align: center; }
        
        /* فيديو مطبخ فاخر كخلفية */
        .bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        .header { padding: 40px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .logo-container { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .ns-logo { font-size: 3rem; font-weight: bold; color: #d4a373; animation: spin 4s linear infinite; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }
        .chef-pic { width: 100px; border-radius: 50%; border: 2px solid #d4a373; }
        
        /* صندوق التسوق */
        .shop-box { margin: 50px auto; padding: 30px; width: 80%; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; border: 2px solid #d4a373; }
        .hidden-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        
        .card { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        .btn { display: block; background: #d4a373; padding: 15px; border-radius: 30px; text-decoration: none; color: white; margin-top: 10px; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline class="bg-video">
        <source src="https://player.vimeo.com/external/494793617.sd.mp4?s=59468501c569f1437c35e38600d869273c591461&profile_id=164" type="video/mp4">
    </video>

    <div class="header">
        <div class="logo-container">
            <div class="ns-logo">NS</div>
            <img src="https://img.freepik.com/free-vector/chef-cartoon-character_1308-33306.jpg" class="chef-pic">
        </div>
        <h1>نسرين للحلويات</h1>
        <div class="shop-box" onclick="document.getElementById('products').style.display='grid'; this.style.display='none';">
            <h2>تسوق أشهى الحلويات</h2>
        </div>
    </div>

    <div id="products" class="hidden-grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nالرابط: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
