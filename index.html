<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلويات نسرين | نكهات لا تُنسى</title>
    <style>
        /* خلفية متحركة */
        body { 
            margin: 0; font-family: 'Cairo', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 15s ease infinite;
            color: #333; min-height: 100vh;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        
        header { padding: 50px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        
        /* بطاقات أنيقة */
        .card { background: white; border-radius: 25px; width: 280px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); transition: 0.4s; }
        .card:hover { transform: scale(1.05); }
        .product-img { width: 100%; height: 180px; background: #eee; border-radius: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        .btn { display: block; padding: 12px; margin: 10px 0; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-wa { background: #25d366; color: white; }
        .btn-gallery { background: #5d2e0c; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>حلويات نسرين 🌸</h1>
        <p>جودةٌ تصنع الفرح في كل قطعة</p>
    </header>

    <div class="container" id="products-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://nesreen-sweets-default-rtdb.firebaseio.com" }));

        onValue(ref(db, 'products'), (snapshot) => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const name = child.val();
                const div = document.createElement('div');
                div.className = 'card';
                // أيقونات تجريبية جذابة بدل الصور المعطلة
                div.innerHTML = `
                    <div class="product-img">🍰</div>
                    <h2>${name}</h2>
                    <a class="btn btn-wa" href="https://wa.me/963982344943?text=مرحباً، أود طلب ${name}">اطلب الآن عبر واتساب</a>
                    <a class="btn btn-gallery" href="javascript:alert('قريباً ستظهر صور ${name} المميزة هنا!')">عرض الصور المميزة</a>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
