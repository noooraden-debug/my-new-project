<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أم عمر للحلويات</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
    body, html { margin: 0; padding: 0; width: 100%; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
    
    /* الفيديو كخلفية موحدة */
    .bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }

    /* إزالة الخلفية الرمادية من القسم العلوي */
    .header-section { padding: 60px 20px; text-align: center; position: relative; z-index: 10; }

    .chef-circle { width: 150px; height: 150px; margin: 10px auto 20px auto; border-radius: 50%; overflow: hidden; border: 4px solid #f8e3b0; }
    .chef-circle img { width: 100%; height: 100%; object-fit: cover; }

    .hero-title { font-family: 'Amiri', serif; font-size: 5rem; font-weight: 900; color: #f8e3b0; text-shadow: 2px 2px 0px #3e2723, 0 0 20px #A67C00; margin: 0; }
    .welcome-text { font-size: 1.8rem; margin: 15px 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

    .shop-btn { background: #A67C00; color: #fff; padding: 15px 50px; border-radius: 50px; font-size: 1.4rem; cursor: pointer; border: none; transition: 0.3s; font-weight: bold; }
    .shop-btn:hover { background: #8e6a00; transform: scale(1.1); }

    #products { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
    
    .card { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; text-align: center; }
    .card img { width: 100%; height: 250px; border-radius: 15px; object-fit: cover; cursor: pointer; }
    .order-btn { display: block; background: #25D366; color: #fff; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 15px; }
</style>
</head>
<body>

<video class="bg-video" autoplay muted loop playsinline><source src="kitchen.mp4" type="video/mp4"></video>

<div class="header-section">
    <div class="chef-circle"><img src="chef.jpg"></div>
    <h1 class="hero-title">أم عمـــر للحلويــــات</h1>
    <p class="welcome-text">تراثٌ من الأصالة.. يذوبُ في فمِك بكلّ حبّ.</p>
    <button class="shop-btn" onclick="document.getElementById('products').style.display='grid'; this.scrollIntoView({behavior: 'smooth'});">استكشف منتجاتنا</button>
</div>

<div id="products">
    <script>
        function order(item) {
            const msg = `مرحبا شيف ام عمر يسلم ايديكي 🌸
رأيت منصة أم عمر للحلويات: https://noooraden-debug.github.io/my-new-project/ وأعجبتني! الاصناف جدا
أرغب بطلب: ${item}`;
            window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
        }
    </script>
    <!-- المنتجات (تم اختصارها هنا للإيجاز) -->
    <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
    <!-- أضف باقي المنتجات بنفس الطريقة -->
</div>

<!-- زر الواتساب العائم بالرسالة الجديدة -->
<a href="https://wa.me/963982344943?text=مرحبا شيف أم عمر سلمت يداكي، قمت بتصفح منصتكم المميزة وأريد الاستفسار عن الأسعار وموعد التسليم لو سمحتي." 
   style="position:fixed; bottom:30px; left:30px; z-index:100; width:65px; height:65px;">
    <img src="رمز واتساب.jfif" alt="واتساب" style="width:100%; height:100%; border-radius:50%; box-shadow:0 4px 10px rgba(0,0,0,0.5);">
</a>

</body>
</html>
