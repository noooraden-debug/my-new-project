<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات | منصة فاخرة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');
        
        /* الخلفية المتحركة (فيديو المطبخ) */
        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; font-family: 'Tajawal', sans-serif; }
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.4); }
        
        .header { padding: 60px 20px; color: white; text-align: center; }
        h1 { font-family: 'Amiri', serif; font-size: 4rem; display: flex; justify-content: center; align-items: center; gap: 20px; text-shadow: 2px 2px 10px #000; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 50px; padding: 40px; }
        .card { background: rgba(255,255,255,0.95); padding: 15px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.5s; text-align: center; }
        .card:hover { transform: translateY(-20px) scale(1.02); }
        .card img { width: 100%; height: 400px; object-fit: cover; border-radius: 20px; border: 4px solid #c69c6d; }
        h3 { font-family: 'Amiri', serif; font-size: 2rem; color: #5d4037; margin: 20px 0; }
        .btn { display: block; background: #5d4037; color: white; padding: 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>
    <!-- فيديو خلفية المطبخ -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="https://player.vimeo.com/external/394749439.sd.mp4?s=f520f81d11b3d683701625906f0e21016629c490&profile_id=164" type="video/mp4">
    </video>

    <div class="header">
        <h1><span>👩‍🍳</span> نسرين للحلويات</h1>
        <p style="font-size: 1.5rem;">المذاق الأشهى بالسمن العربي الأصيل</p>
    </div>
    
    <div class="grid">
        <!-- تم دمج العبارة في الرابط -->
        <script>
            const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: ";
            function getLink(item) { return "https://wa.me/963982344943?text=" + encodeURIComponent(msg + item); }
        </script>
        
        <div class="card"><img src="1.jpg"><h3 onclick="window.location.href=getLink('معمول العجوة')">معمول العجوة</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3 onclick="window.location.href=getLink('معمول الفستق')">معمول الفستق</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3 onclick="window.location.href=getLink('معمول الجوز')">معمول الجوز</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3 onclick="window.location.href=getLink('البيتفور')">البيتفور</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3 onclick="window.location.href=getLink('الكعك')">الكعك</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3 onclick="window.location.href=getLink('الكوكيز')">الكوكيز بالشوكولاته</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3 onclick="window.location.href=getLink('الغريبة')">الغريبة</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3 onclick="window.location.href=getLink('البرازق')">البرازق</h3><a class="btn" href="javascript:void(0)" onclick="window.location.href=getLink('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
