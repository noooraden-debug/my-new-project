<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسرين للحلويات | عالم الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* إعدادات الصفحة - ملء الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background-color: #1a0b00; 
        }

        /* فيديو الخلفية الاحترافي - يغطي كل زاوية في الشاشة */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -100;
            filter: brightness(0.35); 
        }

        /* التنسيق الزجاجي الشفاف الفاخر للرأس */
        .header-glass {
            background: rgba(20, 10, 5, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 2px solid rgba(212, 163, 115, 0.5);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* شعار NS ينبض بإضاءة ذهبية */
        .ns-logo {
            font-family: 'Amiri', serif;
            font-size: 3.5rem;
            font-weight: bold;
            color: #d4a373;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(212, 163, 115, 0.4); }
            100% { transform: scale(1.1); text-shadow: 0 0 25px rgba(212, 163, 115, 1); }
        }

        /* صورة الطباخة الكرتونية المتحركة GIF */
        .chef-gif {
            width: 130px;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(212, 163, 115, 0.5);
            border: 2px solid #d4a373;
        }

        h1 { font-family: 'Amiri', serif; font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 8px #000; }
        .desc { font-size: 1.2rem; color: #f5deb3; margin-top: 10px; text-shadow: 1px 1px 5px #000; }

        /* حاوية زر التسوق */
        .shop-box-container {
            margin: 60px auto;
            text-align: center;
            padding: 0 20px;
        }
        .shop-btn {
            background: linear-gradient(135deg, #d4a373, #8b4513);
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            padding: 18px 50px;
            font-size: 1.8rem;
            font-family: 'Amiri', serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
            width: 100%;
            max-width: 400px;
            animation: bounceIn 1.5s infinite alternate;
        }
        .shop-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 163, 115, 0.6);
            animation: none;
        }
        @keyframes bounceIn {
            0% { transform: translateY(0); box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
            100% { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(212, 163, 115, 0.8); }
        }

        /* شبكة المنتجات */
        .products-grid {
            display: none; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* تصميم كروت المنتجات */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.4s ease;
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(212, 163, 115, 0.3);
        }
        .card h3 { font-family: 'Amiri', serif; font-size: 1.8rem; margin: 15px 0; color: #fff; text-shadow: 1px 1px 5px #000; }
        
        .order-btn {
            display: inline-block;
            background: #d4a373;
            color: #1a1a1a;
            padding: 12px 0;
            width: 100%;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.3rem;
            transition: background 0.3s ease;
        }
        .order-btn:hover { background: #fff; }
    </style>
</head>
<body>

    <!-- فيديو خلفية المطبخ -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-baker-kneading-dough-in-a-bakery-43033-large.mp4" type="video/mp4">
    </video>

    <div class="header-glass">
        <!-- الشعار المتحرك -->
        <div class="ns-logo">NS</div>
        
        <!-- طباخة متحركة (أنثى) -->
        <img src="https://media.tenor.com/uR1dO6d_f40AAAAj/cooking-mama.gif" alt="طباخة نسرين" class="chef-gif">
        
        <h1>نسرين للحلويات</h1>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل.. حيث تمتزج حكايات التراث بلمسة عصرية.</p>
    </div>

    <!-- زر عرض المنتجات الجذاب -->
    <div class="shop-box-container" id="shop-container">
        <button class="shop-btn" onclick="openShop()">تسوق أشهى الحلويات</button>
    </div>

    <!-- قائمة الحلويات -->
    <div class="products-grid" id="products-grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nرابط المنصة: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }

            function openShop() {
                document.getElementById('shop-container').style.display = 'none';
                document.getElementById('products-grid').style.display = 'grid';
                setTimeout(() => window.scrollBy({ top: 200, behavior: 'smooth' }), 100);
            }
        </script>
        
        <div class="card"><img src="1.jpg" alt="معمول العجوة"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg" alt="معمول الفستق"><h3>معمول الفستق</h3><a class="order-btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg" alt="معمول الجوز"><h3>معمول الجوز</h3><a class="order-btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg" alt="البيتفور"><h3>البيتفور</h3><a class="order-btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg" alt="الكعك"><h3>الكعك</h3><a class="order-btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg" alt="الكوكيز"><h3>الكوكيز</h3><a class="order-btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg" alt="الغريبة"><h3>الغريبة</h3><a class="order-btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg" alt="البرازق"><h3>البرازق</h3><a class="order-btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>

</body>
</html>
