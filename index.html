<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات | منصة فاخرة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap');

        /* خلفية الفيديو الفاخرة */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.3); }

        body { margin: 0; font-family: 'Tajawal', sans-serif; color: #fff; text-align: center; }
        
        .header { padding: 60px 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-bottom: 3px solid #c5a059; }
        .chef-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 10px; }
        .chef-gif { width: 80px; animation: wave 2s infinite; }
        @keyframes wave { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        
        h1 { font-family: 'Amiri', serif; font-size: 3.5rem; margin: 0; }
        .desc { font-size: 1.3rem; color: #d4a373; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 30px; border: 1px solid #c5a059; transition: 0.5s; }
        .card:hover { transform: translateY(-15px); background: rgba(197, 160, 89, 0.2); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; border: 3px solid #fff; }
        .btn { display: block; background: #c5a059; color: #1a1a1a; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline class="video-bg">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"> <!-- فيديو ناعم -->
    </video>

    <div class="header">
        <div class="chef-container">
            <img src="https://cdn-icons-png.flaticon.com/512/3069/3069176.png" class="chef-gif">
            <h1>نسرين للحلويات</h1>
        </div>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل.. حيث تمتزج حكايات التراث بلمسة عصرية.</p>
    </div>

    <div class="grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nالرابط: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
