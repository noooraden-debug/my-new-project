<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أم عمر للحلويات | عالم الفخامة</title>
 
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
 
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: #000;
        }
 
        /* خلفية الفيديو */
        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(55%);
            z-index: 0;
        }
 
        /* ترويسة زجاجية راقية */
        .header-glass {
            background: rgba(20, 10, 5, 0.55);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #d4a373;
            position: relative;
            z-index: 10;
        }
 
        .ns-logo {
            font-family: 'Amiri', serif;
            font-size: 4rem;
            color: #d4a373;
            font-weight: bold;
            letter-spacing: 4px;
            text-shadow: 0 0 12px rgba(212,163,115,0.7);
        }
 
        /* دائرة الشيف */
        .chef-circle {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid #d4a373;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0 0 25px rgba(212,163,115,0.8);
            animation: glow 2s infinite alternate;
        }
 
        @keyframes glow {
            from { box-shadow: 0 0 15px rgba(212,163,115,0.5); }
            to   { box-shadow: 0 0 35px rgba(212,163,115,1); }
        }
 
        .chef-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
 
        h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            margin: 10px 0;
        }
 
        .desc {
            font-size: 1.3rem;
            color: #f5deb3;
        }
 
        /* زر تسوق شفاف + تأثيرات فاخرة */
        .shop-btn {
            background: rgba(255,255,255,0.18);
            border: 2px solid rgba(255,255,255,0.4);
            color: #fff;
            padding: 15px 45px;
            font-size: 1.6rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 25px;
            backdrop-filter: blur(6px);
            transition: 0.4s;
        }
 
        .shop-btn:hover {
            background: rgba(255,255,255,0.28);
            transform: scale(1.08);
            box-shadow: 
                0 0 18px rgba(255,215,0,0.9),
                0 0 30px rgba(255,140,0,0.7),
                0 0 45px rgba(255,215,0,0.6);
        }
 
        /* شبكة المنتجات */
        #products {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 22px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }
 
        .card {
            background: rgba(0,0,0,0.55);
            border: 1px solid #d4a373;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            animation: fadeUp 1s ease;
        }
 
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        .card img {
            width: 100%;
            height: 230px;
            object-fit: cover;
            border-radius: 12px;
        }
 
        .order-btn {
            display: block;
            background: #d4a373;
            color: #000;
            padding: 12px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 12px;
            transition: 0.3s;
        }
 
        .order-btn:hover {
            background: #f0c796;
        }
    </style>
</head>
 
<body>
 
    <!-- فيديو الخلفية -->
    <video class="bg-video" autoplay muted loop playsinline webkit-playsinline>
        <source src="kitchen.mp4" type="video/mp4">
    </video>
 
    <div class="header-glass">
        <div class="ns-logo">AO</div>
        <div class="chef-circle">
            <img src="chef.jpg" alt="طباخة">
        </div>
 
        <h1>أم عمر للحلويات</h1>
        <p class="desc">المذاق الأشهى بأجود الأنواع وأرخص الأسعار</p>
 
        <button class="shop-btn" onclick="document.getElementById('products').style.display='grid'; this.style.display='none';">
            تسوق أشهى الحلويات
        </button>
    </div>
 
    <div id="products">
        <script>
            function order(item) {
                const siteURL = "https://noooraden-debug.github.io/my-new-project/";
                const msg = 
`مرحبا 🌸
رأيت منصة أم عمر للحلويات وأعجبتني كثيراً!
وأرغب بطلب: ${item}
 
رابط المنصة:
${siteURL}`;
 
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
 
        <!-- المنتجات -->
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="order-btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="order-btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="order-btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>كليجه</h3><a class="order-btn" href="javascript:order('كليجه')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="order-btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="order-btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>bالبرازق</h3><a class="order-btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
 
    </div>
 
</body>
            </html>
