<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات</title>
    <style>
        /* خلفية مشرقة وناعمة */
        body { 
            margin: 0; padding: 0; background-color: #fdf6e3; 
            font-family: 'Tajawal', sans-serif; text-align: center; color: #3e2723; 
        }
        
        .header { padding: 40px 20px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chef-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #d4a373; margin-bottom: 10px; }
        h1 { font-family: 'Amiri', serif; font-size: 3rem; margin: 0; }
        .subtitle { color: #5d4037; font-size: 1.2rem; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 20px; border: 2px solid #d4a373; }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }
        .btn { display: block; background: #5d4037; color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <!-- طباخة مبتسمة وواضحة -->
        <img src="https://img.freepik.com/free-vector/chef-cartoon-character_1308-33306.jpg" class="chef-img" alt="طباخة">
        <h1>نسرين للحلويات</h1>
        <p class="subtitle">المذاق الأشهى بالسمن العربي الأصيل.. حيث تمتزج حكايات التراث بلمسة عصرية.</p>
    </div>
    
    <div class="grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nالرابط: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
