<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حلويات نسرين - فخامة الطعم</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdf6f0, #ffe4c4); background-attachment: fixed; text-align: center; }
        header { padding: 40px; color: #5d2e0c; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; width: 300px; margin: 20px; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; }
        .btn { display: block; padding: 10px; margin: 5px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        .btn-wa { background: #25d366; color: white; }
        .btn-gallery { background: #8b4513; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>حلويات نسرين 🌸</h1>
        <p>نصنع الفرح في كل قطعة</p>
    </header>

    <div class="container" id="products-list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            databaseURL: "https://nesreen-sweets-default-rtdb.firebaseio.com"
        }));

        onValue(ref(db, 'products'), (snapshot) => {
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const name = child.val();
                const div = document.createElement('div');
                div.className = 'card';
                // جلب صور عشوائية جذابة من الإنترنت حسب اسم الصنف
                div.innerHTML = `
                    <img src="https://source.unsplash.com/300x200/?dessert,${name}" alt="${name}">
                    <h3>${name}</h3>
                    <a class="btn btn-wa" href="https://wa.me/963982344943?text=أريد طلب ${name}">اطلب الآن عبر واتساب</a>
                    <a class="btn btn-gallery" href="#">عرض المزيد من الصور</a>
                `;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
