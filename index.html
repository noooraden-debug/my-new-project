<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسرين للحلويات</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Tajawal', sans-serif; color: #fff;
            background: linear-gradient(-45deg, #1a0b00, #3d2b1f, #1a0b00, #2c1a0f);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-glass { padding: 40px 20px; text-align: center; }
        .ns-logo { font-family: 'Amiri', serif; font-size: 3.5rem; color: #d4a373; font-weight: bold; margin-bottom: 10px; }
        
        /* صورة طباخة واحدة ثابتة */
        .chef-circle {
            width: 150px; height: 150px; margin: 0 auto 20px auto;
            border-radius: 50%; border: 3px solid #d4a373;
            overflow: hidden; background-color: #fff;
        }
        .chef-circle img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Amiri', serif; font-size: 2.8rem; margin: 0; }
        .desc { font-size: 1.2rem; color: #f5deb3; margin-top: 10px; }

        .shop-btn {
            background: #d4a373; border: 2px solid #fff; color: #000;
            padding: 15px 40px; font-size: 1.6rem; border-radius: 50px;
            cursor: pointer; margin-top: 30px; font-weight: bold;
        }

        .products-grid { display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: rgba(0,0,0,0.6); border: 1px solid #d4a373; border-radius: 20px; padding: 15px; text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .order-btn { display: block; background: #d4a373; color: black; padding: 10px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-glass">
        <div class="ns-logo">NS</div>
        <!-- صورة طباخة ثابتة -->
        <div class="chef-circle">
            <img src="https://img.freepik.com/free-vector/hand-drawn-chef-illustration_23-2149591465.jpg" alt="طباخة">
        </div>
        <h1>نسرين للحلويات</h1>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل..</p>
        <button class="shop-btn" onclick="document.getElementById('products').style.display='grid'; this.style.display='none';">تسوق أشهى الحلويات</button>
    </div>

    <div id="products" class="products-grid">
        <script>
            function order(item) {
                const siteURL = "https://noooraden-debug.github.io/my-new-project/";
                const msg = "لقد شاهدت المنصة المتميزة ومعجب بالاصناف الموجودة فيها سلمت يداكي، أريد طلب: " + item + "، رابط المنصة: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="order-btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="order-btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="order-btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="order-btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="order-btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="order-btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="order-btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
