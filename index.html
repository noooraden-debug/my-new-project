<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات | عالم الفخامة</title>
    <style>
        /* الخلفية: فيديو مطبخ فاخر يتحرك في الخلفية */
        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; font-family: 'Tajawal', sans-serif; }
        .bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.4); }
        
        .header { padding: 50px 20px; color: white; text-align: center; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); }
        h1 { font-family: 'Amiri', serif; font-size: 3.5rem; display: flex; justify-content: center; align-items: center; gap: 15px; text-shadow: 0 0 10px #000; }
        .chef-img { width: 80px; height: 80px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .desc { font-size: 1.4rem; color: #d4a373; margin-top: 10px; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; padding: 40px; }
        .card { background: rgba(255,255,255,0.9); padding: 15px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; transition: 0.4s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; border: 4px solid #5d4037; }
        .btn { display: block; background: #5d4037; color: white; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.3rem; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <!-- فيديو المطبخ الفاخر -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="https://media.istockphoto.com/id/1188458778/video/baker-decorating-pastry-with-chocolate.mp4?s=mp4-640x640-is&k=20&c=X7bT1x50J2r2s3c8n9f0L2j5U_9z6y9X1q9j8h7g6f5=" type="video/mp4">
    </video>

    <div class="header">
        <h1>
            <img src="https://cdn-icons-png.flaticon.com/512/2713/2713437.png" class="chef-img">
            نسرين للحلويات
        </h1>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل.. حيث تمتزج حكايات التراث بلمسة عصرية.</p>
    </div>
    
    <div class="grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nرابط المنصة: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
