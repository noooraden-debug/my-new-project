<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أم عمر للحلويات</title>
 
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
 
<style>
body, html { margin: 0; padding: 0; width: 100%; height: 100%; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
 
/* فيديو الخلفية بدون أي تعتيم */
.bg-video {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: none;   /* لا تعتيم */
    z-index: -1;
}
 
/* الرأس شفاف */
.header-glass {
    background: rgba(0,0,0,0.10);
    backdrop-filter: blur(8px);
    padding: 25px 20px;
    text-align: center;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.15);
}
 
/* شعار NS */
.ns-logo {
    font-family: 'Amiri', serif;
    font-size: 4.5rem;
    font-weight: bold;
    color: #f8e3b0;
    text-shadow:
        0 0 10px rgba(255,230,160,0.9),
        0 0 22px rgba(255,200,120,0.8),
        0 0 35px rgba(255,180,80,0.7);
}
 
/* دائرة الشيف */
.chef-circle {
    width: 150px; height: 150px;
    margin: 10px auto;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
}
.chef-circle img { width: 100%; height: 100%; object-fit: cover; }
 
h1 {
    font-family: 'Amiri', serif;
    font-size: 3rem;
    margin: 10px 0 5px 0;
}
 
.desc {
    font-size: 1.3rem;
    color: #ffeccc;
}
 
/* زر التصفح */
.shop-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.40);
    color: #fff;
    padding: 15px 45px;
    border-radius: 40px;
    font-size: 1.3rem;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: 0.3s;
    margin-top: 20px;
}
.shop-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.05);
}
 
/* المنتجات */
#products {
    display: none;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 22px;
    padding: 20px;
    margin-top: 10px;
}
 
.card {
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 18px;
    padding: 12px;
    text-align: center;
}
 
.card img {
    width: 100%;
    height: 220px;
    border-radius: 12px;
    object-fit: cover;
}
 
.order-btn {
    display: block;
    background: rgba(255,255,255,0.25);
    color: #fff;
    padding: 12px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 12px;
    transition: .3s;
}
 
.order-btn:hover {
    background: rgba(255,255,255,0.45);
}
 
</style>
</head>
 
<body>
 
<!-- فيديو الخلفية -->
<video class="bg-video" autoplay muted loop playsinline>
    <source src="kitchen.mp4" type="video/mp4">
</video>
 
<!-- الهيدر -->
<div class="header-glass">
    <div class="ns-logo">NS</div>
 
    <div class="chef-circle">
        <img src="chef.jpg">
    </div>
 
    <h1>أم عمر للحلويات</h1>
    <p class="desc">المذاق الأشهى بأجود الأنواع وأرخص الأسعار</p>
 
    <button class="shop-btn"
        onclick="document.getElementById('products').style.display='grid'; this.style.display='none';">
        تصفح المنتجات
    </button>
</div>
 
<!-- المنتجات -->
<div id="products">
 
<script>
function order(item) {
    const msg =
`مرحبا 🌸
رأيت منصة أم عمر للحلويات وأعجبتني!
أرغب بطلب: ${item}`;
    window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
}
</script>
 
<div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
<div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="order-btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
<div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="order-btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
<div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="order-btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
<div class="card"><img src="5.jpg"><h3>كليجه</h3><a class="order-btn" href="javascript:order('كليجه')">اطلب الآن</a></div>
<div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="order-btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
<div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="order-btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
<div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="order-btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
 
</div>
 
</body>
</html>
