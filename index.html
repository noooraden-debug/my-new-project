<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسرين للحلويات | عالم الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
 
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Tajawal', sans-serif; color: #fff;
            background-size: cover;
            background-position: center;
            animation: bgChange 18s infinite ease-in-out;
            overflow-x: hidden;
        }
 
        @keyframes bgChange {
            0%   { background-image: url('https://i.imgur.com/2YNzPWq.jpg'); }
            33%  { background-image: url('https://i.imgur.com/9xZ0RZO.jpg'); }
            66%  { background-image: url('https://i.imgur.com/a0MZ3zY.jpg'); }
            100% { background-image: url('https://i.imgur.com/2YNzPWq.jpg'); }
        }
 
        .header-glass {
            background: rgba(20, 10, 5, 0.45);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #d4a373;
        }
 
        .ns-logo { font-family: 'Amiri', serif; font-size: 3.5rem; color: #d4a373; font-weight: bold; }
 
        .chef-circle {
            width: 140px; height: 140px; margin: 15px auto;
            border-radius: 50%; border: 3px solid #d4a373;
            overflow: hidden; background-color: #fff;
            box-shadow: 0 0 20px rgba(212,163,115,0.6);
        }
 
        .chef-circle img {
            width: 100%; height: 100%; object-fit: cover;
        }
 
        h1 { font-family: 'Amiri', serif; font-size: 2.8rem; margin: 0; }
        .desc { font-size: 1.2rem; color: #f5deb3; margin-top: 10px; }
 
        .shop-btn {
            background: #d4a373; border: 2px solid #fff; color: #000;
            padding: 15px 50px; font-size: 1.6rem; border-radius: 50px;
            cursor: pointer; font-weight: bold; margin-top: 30px;
        }
 
        .products-grid {
            display: none; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 20px; max-width: 1000px; margin: 0 auto;
        }
 
        .card {
            background: rgba(0,0,0,0.55); border: 1px solid #d4a373; border-radius: 20px;
            padding: 15px; text-align: center;
        }
 
        .card img {
            width: 100%; height: 220px; object-fit: cover; border-radius: 12px;
        }
 
        .order-btn {
            display: block; background: #d4a373; color: #000; padding: 12px;
            border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header-glass">
        <div class="ns-logo">NS</div>
        <div class="chef-circle">
            <img src="https://i.imgur.com/7N1G8bH.png" alt="طباخة">
        </div>
        <h1>نسرين للحلويات</h1>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل..</p>
        <button class="shop-btn" onclick="document.getElementById('products').style.display='grid'; this.style.display='none';">تسوق أشهى الحلويات</button>
    </div>
 
    <div id="products" class="products-grid">
        <script>
            function order(item) {
                const siteURL = "https://noooraden-debug.github.io/my-new-project/";
                const msg = "لقد شاهدت المنصة المتميزة ومعجب بالاصناف الموجودة فيها سلمت يداكي! أريد طلب: " + item + "\nرابط المنصة: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="order-btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="order-btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="order-btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="order-btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
    </div>
</body>
</html>
