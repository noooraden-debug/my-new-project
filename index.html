<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نسرين للحلويات</title>
    <style>
        body, html { margin: 0; padding: 0; min-height: 100vh; font-family: 'Amiri', serif; }
        
        /* الخلفية: فيديو مطبخ متحرك */
        .video-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        
        /* التنسيق العام */
        .header { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 40px; color: #fff; text-align: center; border-bottom: 3px solid #d4a373; }
        .chef-gif { width: 120px; border-radius: 50%; border: 3px solid #d4a373; animation: rotate 10s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 3.5rem; margin: 10px 0; }
        .desc { font-size: 1.4rem; color: #d4a373; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px; }
        .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); }
        .card img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; border: 3px solid #fff; }
        .btn { display: block; background: #d4a373; color: #fff; padding: 18px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; text-decoration: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay muted loop playsinline><source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4"></video>
    </div>

    <div class="header">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4ZzR3a253aG52cW54ZzZ3eHh4N2p4ZzZ3eHh4N2p4ZzZ3eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxxHOGTdzJC/giphy.gif" class="chef-gif">
        <h1>نسرين للحلويات</h1>
        <p class="desc">المذاق الأشهى بالسمن العربي الأصيل.. حيث تمتزج حكايات التراث بلمسة عصرية.</p>
    </div>

    <div class="grid">
        <script>
            const siteURL = "https://noooraden-debug.github.io/my-new-project/";
            function order(item) {
                const msg = "يالها من منصة فاخرة تحتوي أصناف الحلويات الشهية، سلمت يداكي! أريد طلب: " + item + "\nرابط المنصة: " + siteURL;
                window.location.href = "https://wa.me/963982344943?text=" + encodeURIComponent(msg);
            }
        </script>
        
        <div class="card"><img src="1.jpg"><h3>معمول العجوة</h3><a class="btn" href="javascript:order('معمول العجوة')">اطلب الآن</a></div>
        <div class="card"><img src="2.jpg"><h3>معمول الفستق</h3><a class="btn" href="javascript:order('معمول الفستق')">اطلب الآن</a></div>
        <div class="card"><img src="3.jpg"><h3>معمول الجوز</h3><a class="btn" href="javascript:order('معمول الجوز')">اطلب الآن</a></div>
        <div class="card"><img src="4.jpg"><h3>البيتفور</h3><a class="btn" href="javascript:order('البيتفور')">اطلب الآن</a></div>
        <div class="card"><img src="5.jpg"><h3>الكعك</h3><a class="btn" href="javascript:order('الكعك')">اطلب الآن</a></div>
        <div class="card"><img src="6.jpg"><h3>الكوكيز</h3><a class="btn" href="javascript:order('الكوكيز')">اطلب الآن</a></div>
        <div class="card"><img src="7.jpg"><h3>الغريبة</h3><a class="btn" href="javascript:order('الغريبة')">اطلب الآن</a></div>
        <div class="card"><img src="8.jpg"><h3>البرازق</h3><a class="btn" href="javascript:order('البرازق')">اطلب الآن</a></div>
    </div>
</body>
</html>
